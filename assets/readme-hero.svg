<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OptiMac README hero</title>
  <desc id="desc">A polished dark terminal dashboard hero for OptiMac with a sleeping cat mascot and compact cleanup panels.</desc>
  <defs>
